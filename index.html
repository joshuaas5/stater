    <div id="root"></div>
    
    <!-- CSS para otimizações imediatas de scroll e prevenção de jank visual -->
    <style>
      /* Prevenir bouncing/rubber-banding em iOS e outros navegadores */
      html, body, #root {
        overscroll-behavior: none !important;
        overflow-x: hidden;
      }
      
      /* Fundo unificado azul */
      body {
        background-color: #31518b !important;
      }
      
      /* Reduzir movimentos/animações para melhor performance */
      @media (prefers-reduced-motion: reduce) {
        *, ::before, ::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
    
    <!-- PWA Service Worker Registration - Otimizado para Mobile -->
    <script>
      // Registro otimizado de Service Workers
      if ('serviceWorker' in navigator) {
        // Performance hack: Registramos service workers depois da página carregar
        // para não bloquear a renderização inicial da página
        const registerServiceWorkers = () => {
          // 1. Registrar primeiro o SW de performance para priorizar otimizações
          navigator.serviceWorker.register('/performance-worker.js', {
            scope: '/',
            // Atualizar imediatamente o SW para garantir a versão mais recente
            updateViaCache: 'none'
          })
          .then((registration) => {
            console.log('⚡ Performance SW registrado');
            
            // Configurar canal de mensagens para SW de performance
            if (registration.active) {
              // Informar ao SW que a aplicação foi carregada
              registration.active.postMessage({
                type: 'APP_LOADED',
                timestamp: Date.now()
              });
            }
          });
          
          // 2. Então registrar o SW padrão para PWA
          setTimeout(() => {
            navigator.serviceWorker.register('/sw.js');
          }, 2000); // Pequeno delay para priorizar o SW de performance
        };

        // Opções para estratégia de carregamento
        if (document.readyState === 'complete') {
          // Página já carregou completamente
          registerServiceWorkers();
        } else {
          // Primeiro priorizar o carregamento da página
          window.addEventListener('load', () => {
            // Pequeno delay para garantir que renderização principal foi concluída
            setTimeout(registerServiceWorkers, 100);
          });
        }
        
        // Background Sync - só registra se tiver permissão e suporte
        navigator.serviceWorker.ready.then(async (registration) => {
          if ('sync' in registration) {
            try {
              // Tenta registrar uma vez - se falhar, não insiste
              await registration.sync.register('sync-data');
            } catch (e) {
              // Silenciosamente ignora - Background Sync não é crítico
              // NotAllowedError é comum em localhost e alguns navegadores
            }
          }
        });
      }
    </script>
