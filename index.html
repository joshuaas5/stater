  <body>
    <div id="root"></div>
    
    <!-- CSS para otimizações imediatas de scroll e prevenção de jank visual -->
    <style>
      /* Prevenir bouncing/rubber-banding em iOS e outros navegadores */
      html, body, #root {
        overscroll-behavior: none !important;
        overflow-x: hidden;
      }
      
      /* Impedir flash of white content */
      body {
        background-color: #31518b !important;
      }
      
      /* Reduzir movimentos/animações para melhor performance */
      @media (prefers-reduced-motion: reduce) {
        *, ::before, ::after {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
          scroll-behavior: auto !important;
        }
      }
    </style>
    
    <!-- PWA Service Worker Registration -->
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          // Registramos dois service workers:
          // 1. O SW padrão para PWA
          navigator.serviceWorker.register('/sw.js');
          // 2. O SW de performance para otimizações
          navigator.serviceWorker.register('/performance-worker.js')
            .then((registration) => {
              console.log('🔧 SW registrado com sucesso:', registration);
              
              // Configurar um canal de comunicação
              if (registration.active) {
                console.log('🔧 SW ativo e pronto');
              }
              
              // Atualizar o SW se houver uma nova versão
              registration.addEventListener('updatefound', () => {
                const newWorker = registration.installing;
                console.log('🔧 Novo SW encontrado, instalando...');
                
                if (newWorker) {
                  newWorker.addEventListener('statechange', () => {
                    console.log('🔧 SW estado:', newWorker.state);
                    if (newWorker.state === 'activated') {
                      console.log('🔧 Novo SW ativado');
                    }
                  });
                }
              });
            })
            .catch((error) => {
              console.error('🔧 Erro ao registrar SW:', error);
            });
            
          // Tratar erros de controllerchange
          navigator.serviceWorker.addEventListener('controllerchange', () => {
            console.log('🔧 SW controller mudou');
          });
        });
      }
    </script>
