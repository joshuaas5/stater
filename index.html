  <!-- CSS Crítico Inline - evita bloqueio de render -->
  <style>
    *,
    ::before,
    ::after {
      box-sizing: border-box;
      border-width: 0;
      border-style: solid;
      border-color: #e5e7eb
    }

    ::before,
    ::after {
      --tw-content: ''
    }

    html {
      line-height: 1.5;
      -webkit-text-size-adjust: 100%;
      -moz-tab-size: 4;
      tab-size: 4;
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, "Noto Sans", sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      font-feature-settings: normal;
      font-variation-settings: normal
    }

    body {
      margin: 0;
      line-height: inherit;
      min-height: 100vh;
      background: #0f172a;
      color: #fff;
      overflow-y: auto !important
    }

    #root {
      min-height: 100vh;
      display: flex;
      flex-direction: column
    }

    h1,
    h2,
    h3,
    h4,
    h5,
    h6 {
      font-size: inherit;
      font-weight: inherit
    }

    a {
      color: inherit;
      text-decoration: inherit
    }

    button,
    input,
    optgroup,
    select,
    textarea {
      font-family: inherit;
      font-size: 100%;
      font-weight: inherit;
      line-height: inherit;
      color: inherit;
      margin: 0;
      padding: 0
    }

    button,
    select {
      text-transform: none
    }

    button,
    [type='button'],
    [type='reset'],
    [type='submit'] {
      -webkit-appearance: button;
      background-color: transparent;
      background-image: none
    }

    :-moz-focusring {
      outline: auto
    }

    :-moz-ui-invalid {
      box-shadow: none
    }

    progress {
      vertical-align: baseline
    }

    ::-webkit-inner-spin-button,
    ::-webkit-outer-spin-button {
      height: auto
    }

    [type='search'] {
      -webkit-appearance: textfield;
      outline-offset: -2px
    }

    ::-webkit-search-decoration {
      -webkit-appearance: none
    }

    ::-webkit-file-upload-button {
      -webkit-appearance: button;
      font: inherit
    }

    summary {
      display: list-item
    }

    blockquote,
    dl,
    dd,
    h1,
    h2,
    h3,
    h4,
    h5,
    h6,
    hr,
    figure,
    p,
    pre {
      margin: 0
    }

    fieldset {
      margin: 0;
      padding: 0
    }

    legend {
      padding: 0
    }

    ol,
    ul,
    menu {
      list-style: none;
      margin: 0;
      padding: 0
    }

    textarea {
      resize: vertical
    }

    input::placeholder,
    textarea::placeholder {
      opacity: 1;
      color: #9ca3af
    }

    button,
    [role="button"] {
      cursor: pointer
    }

    :disabled {
      cursor: default
    }

    img,
    svg,
    video,
    canvas,
    audio,
    iframe,
    embed,
    object {
      display: block;
      vertical-align: middle
    }

    img,
    video {
      max-width: 100%;
      height: auto
    }

    [hidden] {
      display: none
    }
  </style>

<body>
  <div id="root"></div>

  <!-- CSS para otimizações imediatas -->
  <style>
    /* Reset básico - deixa o navegador controlar scroll naturalmente */
    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100%;
      background-color: #020617 !important;
      /* CRáTICO: NáƒO definir height, overflow, ou transform */
      /* Deixa o navegador controlar scroll nativamente */
      min-height: 100vh;
      overflow-y: auto !important;
      position: static !important;
      height: auto !important;
    }

    /* Prevenir scroll horizontal apenas */
    html {
      overflow-x: hidden;
    }

    /* Touch nativo para melhor responsividade mobile */
    body {
      -webkit-overflow-scrolling: touch;
    }

    /* Reduzir movimentos/animações para melhor performance */
    @media (prefers-reduced-motion: reduce) {

      *,
      ::before,
      ::after {
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: 0.01ms !important;
        scroll-behavior: auto !important;
      }
    }
  </style>

  <!-- PWA Service Worker - LAZY LOAD -->
  <script>
    window.addEventListener('load', () => {
      if ('serviceWorker' in navigator) {
        setTimeout(() => {
          navigator.serviceWorker.register('/performance-worker.js', { scope: '/', updateViaCache: 'none' });
          setTimeout(() => navigator.serviceWorker.register('/sw.js'), 2000);
        }, 3000);
      }
    });
  </script>
