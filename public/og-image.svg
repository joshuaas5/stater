<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Fundo azul gradiente do app -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="100%" style="stop-color:#1e40af"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Smartphone mockup -->
  <rect x="400" y="50" width="400" height="530" rx="30" fill="#000" opacity="0.1"/>
  <rect x="410" y="60" width="380" height="510" rx="25" fill="#ffffff"/>
  
  <!-- App header -->
  <rect x="410" y="60" width="380" height="80" rx="25" rx="25" fill="url(#bg)"/>
  
  <!-- Logo Stater no header -->
  <g transform="translate(560, 80)">
    <!-- Peixe pequeno no header -->
    <ellipse cx="20" cy="10" rx="15" ry="8" fill="#F4B942"/>
    <path d="M8 10 L4 6 L4 14 Z" fill="#F4B942"/>
    <circle cx="28" cy="8" r="2" fill="white"/>
    <circle cx="32" cy="12" r="3" fill="#F4B942"/>
    <text x="36" y="14" font-family="system-ui" font-size="8" font-weight="bold" fill="#F4B942">$</text>
  </g>
  
  <text x="600" y="110" text-anchor="middle" fill="white" font-family="system-ui" font-size="24" font-weight="bold">Stater</text>
  
  <!-- Dashboard cards -->
  <rect x="430" y="160" width="340" height="60" rx="10" fill="#f3f4f6"/>
  <text x="450" y="185" fill="#374151" font-family="system-ui" font-size="14" font-weight="600">💰 Saldo Atual</text>
  <text x="450" y="205" fill="#059669" font-family="system-ui" font-size="20" font-weight="bold">R$ 1.250,00</text>
  
  <rect x="430" y="240" width="165" height="80" rx="10" fill="#dcfce7"/>
  <text x="450" y="265" fill="#166534" font-family="system-ui" font-size="12" font-weight="600">📈 Receitas</text>
  <text x="450" y="285" fill="#166534" font-family="system-ui" font-size="16" font-weight="bold">R$ 3.200</text>
  <text x="450" y="305" fill="#16a34a" font-family="system-ui" font-size="11">+12% este mês</text>
  
  <rect x="605" y="240" width="165" height="80" rx="10" fill="#fef3c7"/>
  <text x="625" y="265" fill="#92400e" font-family="system-ui" font-size="12" font-weight="600">📉 Despesas</text>
  <text x="625" y="285" fill="#92400e" font-family="system-ui" font-size="16" font-weight="bold">R$ 1.950</text>
  <text x="625" y="305" fill="#d97706" font-family="system-ui" font-size="11">-5% este mês</text>
  
  <!-- IA Chat area -->
  <rect x="430" y="340" width="340" height="100" rx="10" fill="#eff6ff"/>
  <text x="450" y="365" fill="#1e40af" font-family="system-ui" font-size="12" font-weight="600">🤖 Stater IA</text>
  <text x="450" y="385" fill="#374151" font-family="system-ui" font-size="11">Como posso ajudar com suas</text>
  <text x="450" y="400" fill="#374151" font-family="system-ui" font-size="11">finanças hoje?</text>
  <rect x="450" y="410" width="80" height="20" rx="10" fill="#3b82f6"/>
  <text x="490" y="423" text-anchor="middle" fill="white" font-family="system-ui" font-size="10">Conversar</text>
  
  <!-- Telegram connection -->
  <rect x="430" y="460" width="340" height="40" rx="10" fill="#dcfce7"/>
  <text x="450" y="480" fill="#166534" font-family="system-ui" font-size="11" font-weight="600">✅ Telegram Conectado</text>
  <text x="450" y="495" fill="#16a34a" font-family="system-ui" font-size="10">📱 Recebendo notificações</text>
  
  <!-- Branding -->
  <text x="600" y="590" text-anchor="middle" fill="white" font-family="system-ui" font-size="32" font-weight="bold">Stater</text>
  <text x="600" y="610" text-anchor="middle" fill="white" font-family="system-ui" font-size="14" opacity="0.8">Assistente Financeiro Inteligente</text>
</svg>
